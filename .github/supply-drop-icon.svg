<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" shape-rendering="crispEdges">
  <title>Supply Drop BBS</title>
  <desc>Pixel-art logo: parachute dropping a wooden supply crate.</desc>

  <!-- Parachute dome -->
  <rect x="8" y="2" width="8" height="1" fill="#7dcaff"/>
  <rect x="6" y="3" width="12" height="1" fill="#7dcaff"/>
  <rect x="5" y="4" width="14" height="1" fill="#5ab8ff"/>
  <rect x="4" y="5" width="16" height="1" fill="#5ab8ff"/>
  <rect x="4" y="6" width="16" height="1" fill="#3a8ad8"/>
  <rect x="3" y="7" width="18" height="1" fill="#3a8ad8"/>

  <!-- Dome bottom edge with three gore scallops -->
  <rect x="3" y="8" width="2" height="1" fill="#3a8ad8"/>
  <rect x="6" y="8" width="4" height="1" fill="#3a8ad8"/>
  <rect x="11" y="8" width="2" height="1" fill="#3a8ad8"/>
  <rect x="14" y="8" width="4" height="1" fill="#3a8ad8"/>
  <rect x="19" y="8" width="2" height="1" fill="#3a8ad8"/>

  <!-- Gore seams -->
  <rect x="8" y="3" width="1" height="5" fill="#0d2a52"/>
  <rect x="15" y="3" width="1" height="5" fill="#0d2a52"/>
  <rect x="11" y="2" width="2" height="1" fill="#0d2a52"/>
  <rect x="11" y="3" width="2" height="1" fill="#3a8ad8"/>

  <!-- Suspension lines — medium gray reads on both light and dark backgrounds -->
  <rect x="4" y="9" width="1" height="1" fill="#888"/>
  <rect x="5" y="10" width="1" height="1" fill="#888"/>
  <rect x="6" y="11" width="1" height="1" fill="#888"/>
  <rect x="7" y="12" width="1" height="1" fill="#888"/>

  <rect x="9" y="9" width="1" height="1" fill="#888"/>
  <rect x="9" y="10" width="1" height="1" fill="#888"/>
  <rect x="9" y="11" width="1" height="1" fill="#888"/>
  <rect x="9" y="12" width="1" height="1" fill="#888"/>

  <rect x="14" y="9" width="1" height="1" fill="#888"/>
  <rect x="14" y="10" width="1" height="1" fill="#888"/>
  <rect x="14" y="11" width="1" height="1" fill="#888"/>
  <rect x="14" y="12" width="1" height="1" fill="#888"/>

  <rect x="19" y="9" width="1" height="1" fill="#888"/>
  <rect x="18" y="10" width="1" height="1" fill="#888"/>
  <rect x="17" y="11" width="1" height="1" fill="#888"/>
  <rect x="16" y="12" width="1" height="1" fill="#888"/>

  <!-- Crate -->
  <rect x="7" y="13" width="10" height="8" fill="#a8682a"/>
  <rect x="7" y="13" width="10" height="1" fill="#d4a04a"/>
  <rect x="7" y="14" width="10" height="1" fill="#c08838"/>
  <rect x="7" y="20" width="10" height="1" fill="#6e3f18"/>
  <rect x="7" y="13" width="1" height="8" fill="#6e3f18"/>
  <rect x="16" y="13" width="1" height="8" fill="#6e3f18"/>
  <rect x="8" y="16" width="8" height="1" fill="#6e3f18"/>

  <!-- X-bracing -->
  <rect x="9" y="17" width="1" height="1" fill="#6e3f18"/>
  <rect x="10" y="18" width="1" height="1" fill="#6e3f18"/>
  <rect x="11" y="19" width="2" height="1" fill="#6e3f18"/>
  <rect x="13" y="18" width="1" height="1" fill="#6e3f18"/>
  <rect x="14" y="17" width="1" height="1" fill="#6e3f18"/>
  <rect x="14" y="19" width="1" height="1" fill="#6e3f18"/>
  <rect x="9" y="19" width="1" height="1" fill="#6e3f18"/>

  <rect x="8" y="13" width="8" height="1" fill="#e8b95a"/>
</svg>
