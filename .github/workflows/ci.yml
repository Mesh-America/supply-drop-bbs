name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  # Treat warnings as errors in CI. Local dev still gets warnings;
  # the wall is at the merge gate.
  RUSTFLAGS: -D warnings
  # Use pre-committed .sqlx/ query metadata instead of a live DB.
  # Developers run `cargo sqlx prepare --workspace` after schema changes.
  SQLX_OFFLINE: "true"

jobs:
  # ─── The headline job: format, lint, build, test ────────────────
  check:
    name: Format · Lint · Build · Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        # @master + explicit toolchain so we install the exact version
        # rust-toolchain.toml pins (1.96). Using @stable here would
        # install the *latest* stable, which then conflicts with
        # rust-toolchain.toml when cargo invokes itself.
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.96"
          components: rustfmt, clippy

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy (default features)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Clippy (all features)
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Build (default features)
        run: cargo build --workspace

      - name: Build (all features)
        run: cargo build --workspace --all-features

      - name: Test (default features)
        run: cargo test --workspace

      - name: Test (all features)
        run: cargo test --workspace --all-features

  # Cross-compilation and release binaries are built by release.yml
  # when a version tag is pushed. Running them on every commit to main
  # burns ~45 min of runner time per push for no additional signal.
