name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  # Treat warnings as errors in CI. Local dev still gets warnings;
  # the wall is at the merge gate.
  RUSTFLAGS: -D warnings

jobs:
  # ─── The headline job: format, lint, build, test ────────────────
  check:
    name: Format · Lint · Build · Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          # rust-toolchain.toml in the repo pins the exact version;
          # this action picks it up automatically.
          components: rustfmt, clippy

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy (default features)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Clippy (all features)
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Build (default features)
        run: cargo build --workspace

      - name: Build (all features)
        run: cargo build --workspace --all-features

      - name: Test (default features)
        run: cargo test --workspace

      - name: Test (all features)
        run: cargo test --workspace --all-features

  # ─── Cross-compile for the deployment targets ───────────────────
  cross-build:
    name: Cross-build · ${{ matrix.target }}
    runs-on: ubuntu-latest
    needs: check
    strategy:
      fail-fast: false
      matrix:
        target:
          - aarch64-unknown-linux-gnu
          - armv7-unknown-linux-gnueabihf
          - x86_64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (with target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compile toolchain
        run: |
          sudo apt-get update
          case "${{ matrix.target }}" in
            aarch64-unknown-linux-gnu)
              sudo apt-get install -y gcc-aarch64-linux-gnu
              ;;
            armv7-unknown-linux-gnueabihf)
              sudo apt-get install -y gcc-arm-linux-gnueabihf
              ;;
            x86_64-unknown-linux-gnu)
              # native target on the runner; no extra toolchain
              ;;
          esac

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build (default features)
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (admin-web feature)
        run: cargo build --release --target ${{ matrix.target }} --features admin-web

      - name: "Build (headless: cli only)"
        run: |
          cargo build --release --target ${{ matrix.target }} \
            --no-default-features --features transport-cli

  # ─── Documentation builds clean ─────────────────────────────────
  docs:
    name: Docs build cleanly
    runs-on: ubuntu-latest
    needs: check
    env:
      # Treat doc warnings as errors so missing/dangling doc links
      # fail CI rather than slipping through.
      RUSTDOCFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2

      - name: Build rustdoc
        run: cargo doc --workspace --no-deps --all-features
