# git-cliff configuration — https://git-cliff.org/docs/configuration
#
# Run manually:   git cliff --output CHANGELOG.md
# Generate notes for a tag:  git cliff v0.1.0..v0.2.0 --output -
# Integrated via cargo-release: set in release.toml

[changelog]
header = """
# Changelog

All notable changes to supply-drop-bbs are documented here.
Versioning follows [Semantic Versioning](https://semver.org/) (pre-1.0:
minor bumps may carry breaking changes).

<!-- generated by git-cliff -->
"""

body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] — {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim | upper_first }}
{% for commit in commits %}
- {% if commit.breaking %}**BREAKING** {% endif %}\
{{ commit.message | upper_first }} \
([`{{ commit.id | truncate(length=7, end="") }}`]({{ commit.id }})){% if commit.github.username %} by @{{ commit.github.username }}{% endif %}\
{% endfor %}
{% endfor %}\n
"""

footer = ""
trim = true

[git]
# Only include conventional commits.
conventional_commits = true
filter_unconventional = true
split_commits = false

commit_preprocessors = [
  # Strip issue/PR references that are already in the body.
  { pattern = '\(closes #(\d+)\)', replace = "" },
]

commit_parsers = [
  # Map conventional-commit types → changelog section groups.
  { message = "^feat", group = "Features" },
  { message = "^fix",  group = "Bug Fixes" },
  { message = "^perf", group = "Performance" },
  { message = "^refactor", group = "Refactoring" },
  { message = "^docs", group = "Documentation" },
  { message = "^style", group = "Styling" },
  { message = "^test", group = "Testing" },
  { message = "^chore\\(release\\)", skip = true },
  { message = "^chore", group = "Chores" },
  { body    = ".*BREAKING CHANGE.*", group = "Breaking Changes" },
]

# Don't include initial commit noise.
filter_commits = false

# Tag pattern — only process vMAJOR.MINOR.PATCH tags.
tag_pattern = "v[0-9].*"

# Oldest tag to include in "unreleased" section.
# Leave empty to start from the beginning of the repo.
topo_order = false
sort_commits = "newest"
