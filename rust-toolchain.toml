# Pinned Rust toolchain. Contributors cloning the repo and running
# any cargo command will have rustup auto-install this version.
#
# We pin to a specific stable rather than tracking `stable` so
# CI builds and contributor builds match bit-for-bit.

[toolchain]
# Floor pinned to a current-ish stable. Several common
# crates (time, serde) bump their MSRV regularly; pinning past
# their floors is the maintainable path. Bumping past this is
# fine; CI matches whatever is pinned here.
channel    = "1.88"
components = ["rustfmt", "clippy"]
profile    = "minimal"
